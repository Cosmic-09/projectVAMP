<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <style>
body{
    background-color: #000000;
    display: block;
}
#head{
  color: rgb(0, 255, 0);
  text-align: center;
  margin: 50px;
  font-size: 20px;
  font-weight: bolder;
}
#buttons{
  margin: 0;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  align-content: flex-start;
  gap: 30px;
}
button {
  height: 50px;
  width: 100px;
  font-size: 16px;
  border-radius: 10px;
  background-color: rgb(41, 37, 37);
  color: rgb(0, 255, 0);
  font-weight: bolder;
}
@media (max-width:500px){
  button {
  height: 50px;
  width: 100px;
  font-size: 16px;
  border-radius: 5px;
  background-color: rgb(41, 37, 37);
  color: rgb(0, 255, 0);
  font-weight: bolder;
 }
}
@media (min-width:501px){
  button {
  height: 100px;
  width: 200px;
  font-size: 16px;
  border-radius: 10px;
  background-color: rgb(41, 37, 37);
  color: rgb(0, 255, 0);
  font-weight: bolder;
 }
}
  </style>
</head>

<body>
  <div id = "head">
  <h1>command center</h1>
  </div>
  <div id = "buttons">
  <button onclick="goToTerminal()">Open Terminal</button>
  <button onclick="sendCommand('vsc')">Open VSC</button>
  <button onclick="sendCommand('firefox')">Open firefox</button>
  <button onclick="sendCommand('stop_server')">stop server</button>
  <button onclick="sendCommand('shutdown')">shutdown</button>
  <button onclick="filesystem()">filesystem</button>
  <button onclick="showSystemStatus()">System Status</button>
  <button onclick="logout()">Logout</button>
  </div>

  <div id="system-status" style="display:none; margin: 20px auto; max-width: 600px; color: rgb(0, 255, 0); background: #111; padding: 20px; border-radius: 8px; font-family: monospace;"></div>

  <script>
    function sendCommand(cmd) {
      let password = null
      if (cmd == "stop_server" || cmd == "shutdown") {
        password = prompt("enter your password:")
      }

      fetch("/run", {
        method: "POST",
        headers: {
          'Content-Type': 'application/json'
        },
        credentials: 'include',
        body: JSON.stringify({ command: cmd, password: password })
      })
      .then(res => res.json())
      .then(data => {
        if (data.error){
          alert(data.error)
        }
      });
    }
    function goToTerminal() {
      window.location.href = "/terminal";
    }
    function filesystem(){
      let password = prompt("enter your password:")
      fetch("/filesystem", {
        method: "POST",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        },
        credentials: 'include',
        body: new URLSearchParams({ password: password })
      })
      .then(res => res.text())
      .then(html => {
        if (html.includes("Wrong password")) {
          alert("Wrong password")
        } else {
          document.open();
          document.write(html);
          document.close();
        }
      });
    }
    function logout() {
      fetch("/logout", {
        method: "POST",
        credentials: 'include'
      }).then(() => window.location.href = "/");
    }

    function showSystemStatus() {
      fetch('/system_status', {
        method: 'GET',
        credentials: 'include'
      })
      .then(res => res.json())
      .then(data => {
        if (data.error) {
          alert(data.error);
          return;
        }
        let statusDiv = document.getElementById('system-status');
        statusDiv.innerHTML = `
          <h3>System Status</h3>
          <p>CPU Usage: ${data.cpu_usage}%</p>
          <p>Memory Usage: ${data.memory_usage}% (${data.memory_used_gb} GB / ${data.memory_total_gb} GB)</p>
          <p>CPU Temperature: ${data.cpu_temp_celsius ? data.cpu_temp_celsius + ' °C' : 'N/A'}</p>
          <p>Disk Usage: ${data.disk_usage}% (${data.disk_used_gb} GB / ${data.disk_total_gb} GB)</p>
          <p>Battery: ${data.battery_percent ? data.battery_percent + '%' : 'N/A'}</p>
        `;
        statusDiv.style.display = 'block';
      })
      .catch(err => {
        alert('Error fetching system status');
      });
    }
  </script>
</body>
</html>
