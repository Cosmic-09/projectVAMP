<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <style>
body{
    background-color: #000000;
}
#head{
  color: rgb(0, 255, 0);
  text-align: center;
  margin: 50px;
  font-size: 20px;
  font-weight: bolder;
}
#buttons{
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  align-content: flex-start;
  gap: 30px;
}
button {
  height: 50px;
  width: 100px;
  font-size: 16px;
  border-radius: 10px;
  background-color: rgb(41, 37, 37);
  color: rgb(0, 255, 0);
  font-weight: bolder;
}
@media (max-width:500px){
  button {
  height: 50px;
  width: 100px;
  font-size: 16px;
  border-radius: 5px;
  background-color: rgb(41, 37, 37);
  color: rgb(0, 255, 0);
  font-weight: bolder;
 }
}
@media (min-width:501px){
  button {
  height: 100px;
  width: 200px;
  font-size: 16px;
  border-radius: 10px;
  background-color: rgb(41, 37, 37);
  color: rgb(0, 255, 0);
  font-weight: bolder;
 }
}
  </style>
</head>

<body>
  <div id = "head">
  <h1>command center</h1>
  </div>
  <div id = "buttons">
  <button onclick="goToTerminal()">Open Terminal</button>
  <button onclick="sendCommand('vsc')">Open VSC</button>
  <button onclick="sendCommand('firefox')">Open firefox</button>
  <button onclick="sendCommand('stop_server')">stop server</button>
  <button onclick="sendCommand('shutdown')">shutdown</button>
  <button onclick="filesystem()">filesystem</button>
  <button onclick="logout()">Logout</button>
  </div>

  <script>
    function sendCommand(cmd) {
      let password = null
      if (cmd == "stop_server" || cmd == "shutdown") {
        password = prompt("enter your password:")
      }

      fetch("/run", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        credentials: 'include',
        body: JSON.stringify({ command: cmd,password: password })
      })
      .then(res => res.json())
      .then(data => {
        if (data.error){
          alert(data.error)
        }
      });
    }
    function goToTerminal() {
      window.location.href = "/terminal";
    }
    function filesystem(){
      let password = prompt("enter your password:")
      fetch("/filesystem", {
        method: "POST",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        },
        credentials: 'include',
        body: new URLSearchParams({ password: password })
      })
      .then(res => res.text())
      .then(html => {
        if (html.includes("Wrong password")) {
          alert("Wrong password")
        } else {
          document.open();
          document.write(html);
          document.close();
        }
      });
    }
    function logout() {
      fetch("/logout", {
        method: "POST",
        credentials: 'include'
      }).then(() => window.location.href = "/");
    }
  </script>
</body>
</html>
